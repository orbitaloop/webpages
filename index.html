<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Webpages — Samuel Michelot</title>
  <meta name="description" content="Pages publiées par Samuel Michelot.">
  <style>
    :root {
      --bg: #0a1628;
      --fg: #e8eef5;
      --muted: #8fa3bd;
      --accent: #d4af37;
      --card: #122236;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100vh;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }
    h1 {
      font-size: 2.5rem;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    .lead {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 3rem;
    }
    h2 {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin: 2.5rem 0 1rem;
    }
    .pages {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .pages li {
      background: var(--card);
      border-radius: 8px;
      margin-bottom: 0.75rem;
      transition: transform 0.15s ease;
    }
    .pages li:hover { transform: translateX(4px); }
    .pages a {
      display: block;
      padding: 1rem 1.25rem;
      color: var(--fg);
      text-decoration: none;
    }
    .pages a:hover { color: var(--accent); }
    .empty {
      color: var(--muted);
      font-style: italic;
      padding: 1rem 0;
    }
    footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--card);
      color: var(--muted);
      font-size: 0.9rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Webpages</h1>
    <p class="lead">Pages publiées par Samuel Michelot.</p>

    <h2>Pages</h2>
    <ul class="pages">
      <li><a href="pages/test.html">Page de test</a></li>
      <li><a href="pages/exemple.html">Page d'exemple</a></li>
    </ul>

    <footer>
      <p>Hébergé par <a href="https://github.com/orbitaloop/webpages">GitHub Pages</a>.</p>
    </footer>
  </div>
</body>
</html>
